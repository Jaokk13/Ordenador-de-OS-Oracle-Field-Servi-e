<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 320px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; }
        h3 { text-align: center; color: #333; margin-top: 0; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        label { font-size: 12px; font-weight: bold; color: #555; }
        textarea { width: 100%; height: 90px; margin-top: 5px; margin-bottom: 10px; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; resize: none; font-family: monospace; }
        button { width: 100%; padding: 10px; margin-bottom: 10px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; transition: background 0.2s; }
        
        .btn-desordenar { background-color: #e74c3c; color: white; }
        .btn-desordenar:hover { background-color: #c0392b; }
        
        .btn-ordenar { background-color: #27ae60; color: white; }
        .btn-ordenar:hover { background-color: #2ecc71; }
        
        .btn-limpar { background-color: #95a5a6; color: white; margin-bottom: 0; }
        .btn-limpar:hover { background-color: #7f8c8d; }
        
        hr { border: 0; height: 1px; background: #ddd; margin: 15px 0; }
    </style>
</head>
<body>
    <h3>Automação OFS</h3>
    
    <button id="btnDesordenar" class="btn-desordenar">1. Desordenar Todas</button>
    
    <hr>
    
    <label>Lista de OS (vírgula ou quebra de linha):</label>
    <textarea id="listaOs" placeholder="Ex: R66384696&#10;66967775"></textarea>
    
    <button id="btnOrdenar" class="btn-ordenar">2. Ordenar por Lista</button>
    <button id="btnLimpar" class="btn-limpar">Limpar Lista</button>

    <script src="popup.js"></script>
</body>
</html>
